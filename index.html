<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Container de Escala - Ele força a proporção exata */
        #viewport {
            width: 1920px;
            height: 1080px;
            transform-origin: center center;
            position: relative;
            background: #000;
        }

        /* Tela Splash e Painel ocupam o mesmo viewport */
        .tela { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Estilos da Splash (mantendo o seu design) */
        #tela-splash { z-index: 9999; display: flex; justify-content: center; align-items: center; background: #000; }
        #splash-content { border: 3px solid cyan; border-radius: 20px; padding: 60px; text-align: center; color: cyan; }
        
        /* Painel Principal */
        #painel-principal { display: none; background: #000; }
        #header-container { width: 100%; padding-top: 30px; text-align: center; }
        #titulo-app { color: #00ffff; font-size: 80px; margin: 0; text-transform: uppercase; }
        #status-bar { width: 90%; margin: 30px auto; padding: 30px; border: 3px solid #333; color: #ff8800; font-size: 40px; font-weight: bold; }
        #game-container { position: relative; width: 1728px; height: 972px; margin: 0 auto; background: url('ambiente.jpg') no-repeat center center; background-size: contain; }

        /* Elementos funcionais mantêm posições fixas em px */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .bolinha { width: 40px; height: 40px; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 3px solid white; z-index: 1000; }
        .conector { position: absolute; width: 100px; z-index: 999; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 2000; cursor: pointer; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="tela-splash" class="tela">
        <div id="splash-content">
            <h1>LABORATÓRIO SMT PRO</h1>
            <h2>CAMPAINHA ELETROMAGNÉTICA</h2>
            <p>CIRCUITO MONOFÁSICO - 127V</p>
            <button id="btn-iniciar" style="font-size: 30px; padding: 20px;">INICIAR LABORATÓRIO</button>
        </div>
    </div>

    <div id="painel-principal" class="tela">
        <div id="header-container">
            <h1 id="titulo-app">LABORATÓRIO SMT PRO</h1>
            <div id="status-bar">REDE: CLIQUE NA REFERÊNCIA INDICADA NO BARRAMENTO</div>
        </div>
        <div id="game-container">
            </div>
    </div>
</div>

<script>
    // Função de Escala Automática
    function ajustarEscala() {
        const vp = document.getElementById('viewport');
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        vp.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', ajustarEscala);
    ajustarEscala();

    document.getElementById('btn-iniciar').onclick = () => {
        document.getElementById('tela-splash').style.display = 'none';
        document.getElementById('painel-principal').style.display = 'block';
    };
</script>
</body>
</html>
