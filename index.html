<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1200px; /* Largura base */
            aspect-ratio: 1200 / 800; /* Ajuste para a proporção da sua imagem (L / A) */
            background: url('ambiente.jpg') no-repeat center;
            background-size: contain;
            margin-top: 20px;
        }
        
        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }

        .bolinha {
            width: 2%; /* Tamanho relativo */
            aspect-ratio: 1/1;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            display: none;
            border: 2px solid white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvasCabo" width="1200" height="800"></canvas>
        <div id="bolinha1" class="bolinha"></div>
        <div id="bolinha2" class="bolinha"></div>
    </div>

    <script>
        // Use porcentagem para as coordenadas (0 a 100)
        // Isso resolve o problema do zoom/tamanho da tela
        const cabos = [
            { nome: "FASE_REDE", total: 64, b1: {x: 10, y: 10}, b2: {x: 30, y: 30}, cor: "red" },
            { nome: "NEUTRO_REDE", total: 76, b1: {x: 15, y: 15}, b2: {x: 35, y: 35}, cor: "blue" },
            { nome: "FASE2", total: 25, b1: {x: 20, y: 20}, b2: {x: 40, y: 40}, cor: "red" },
            { nome: "NEUTRO2", total: 15, b1: {x: 25, y: 25}, b2: {x: 45, y: 45}, cor: "blue" },
            { nome: "RETORNO", total: 45, b1: {x: 30, y: 30}, b2: {x: 50, y: 50}, cor: "yellow" }
        ];

        let indiceAtual = 0;
        const canvas = document.getElementById('canvasCabo');
        const ctx = canvas.getContext('2d');
        const b1 = document.getElementById('bolinha1');
        const b2 = document.getElementById('bolinha2');

        function iniciarCabo() {
            if (indiceAtual >= cabos.length) return;
            const c = cabos[indiceAtual];
            
            // Posicionamento relativo (em %)
            b1.style.left = c.b1.x + "%";
            b1.style.top = c.b1.y + "%";
            b1.style.backgroundColor = c.cor;
            b1.style.display = "block";
            
            b1.onclick = () => {
                b1.style.backgroundColor = "green";
                b2.style.left = c.b2.x + "%";
                b2.style.top = c.b2.y + "%";
                b2.style.backgroundColor = c.cor;
                b2.style.display = "block";
            };

            b2.onclick = () => {
                b1.style.display = "none";
                b2.style.display = "none";
                animar(c);
            };
        }

        function animar(c) {
            let frame = 1;
            let intervalo = setInterval(() => {
                let img = new Image();
                img.src = `${c.nome}/quadro${frame.toString().padStart(4, '0')}.png`;
                img.onload = () => {
                    // Limpa e redesenha o frame
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
                
                frame++;
                if (frame > c.total) {
                    clearInterval(intervalo);
                    indiceAtual++;
                    iniciarCabo();
                }
            }, 50);
        }

        iniciarCabo();
    </script>
</body>
</html>
