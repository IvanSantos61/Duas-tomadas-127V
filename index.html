<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #main-container {
            width: 1400px; height: 800px;
            background: #141a24;
            border: 2px solid #2d3748;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        #titulo { color: #00ffff; font-size: 40px; margin: 20px 0; text-transform: uppercase; }
        #status-bar { width: 90%; padding: 15px; color: #ffcc00; text-align: center; font-size: 25px; border: 2px solid #333; background: #000; margin-bottom: 20px; }
        
        #work-area { width: 95%; height: 500px; background: url('ambiente.jpg') no-repeat center center; background-size: contain; position: relative; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .bolinha { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; position: absolute; cursor: pointer; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="main-container">
        <h1 id="titulo">LABORATÓRIO SMT PRO</h1>
        <div id="status-bar">CARREGANDO...</div>
        
        <div id="work-area">
            <canvas id="canvas" width="1400" height="500"></canvas>
            <div id="b1" class="bolinha"></div>
            <div id="b2" class="bolinha"></div>
        </div>
    </div>

<script>
    const config = [
        { nome: "FASE_REDE", total: 64, cor: "red", p1: {x: 100, y: 100}, p2: {x: 800, y: 300} },
        { nome: "NEUTRO_REDE", total: 76, cor: "blue", p1: {x: 150, y: 150}, p2: {x: 850, y: 350} }
        // Adicione os outros aqui seguindo o mesmo padrão
    ];

    let i = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2');
    const status = document.getElementById('status-bar');

    function rodarCiclo() {
        if (i >= config.length) { status.innerText = "LABORATÓRIO CONCLUÍDO!"; return; }
        let c = config[i];
        status.innerText = "CONECTE: " + c.nome.replace('_', ' ');
        
        b1.style.left = c.p1.x + "px"; b1.style.top = c.p1.y + "px"; b1.style.backgroundColor = c.cor;
        b1.style.display = "block"; b2.style.display = "none";

        b1.onclick = () => {
            b1.style.backgroundColor = "green";
            b2.style.left = c.p2.x + "px"; b2.style.top = c.p2.y + "px"; b2.style.backgroundColor = c.cor;
            b2.style.display = "block";
        };

        b2.onclick = () => {
            b1.style.display = "none"; b2.style.display = "none";
            animar(c);
        };
    }

    function animar(c) {
        let f = 1;
        let intv = setInterval(() => {
            let img = new Image();
            img.src = `${c.nome}/quadro${f.toString().padStart(4, '0')}.png`;
            img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
            if (++f > c.total) { clearInterval(intv); i++; rodarCiclo(); }
        }, 50);
    }

    rodarCiclo();
</script>
</body>
</html>
