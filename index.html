<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro</title>
    <style>
        /* ... Seu CSS mantido exatamente como você enviou antes ... */
        .balao-info { position: absolute; right: 2%; background: white; color: black; padding: 15px; border-radius: 10px; width: 250px; z-index: 3000; font-size: 14px; font-weight: bold; border: 2px solid #00f2ff; }
        .norma-red { color: red; display: block; margin-top: 5px; font-size: 12px; }
        #balao-1 { top: 10%; }
        #balao-2 { top: 30%; }
        .oculto { display: none !important; }
    </style>
</head>
<body>

    <div id="balao-1" class="balao-info oculto">A seção mínima dos fios de iluminação é 1,5 mm2 <span class="norma-red">(Item 6.2.6.1.1 da NBR-5410)</span></div>
    <div id="balao-2" class="balao-info oculto">A fase pode ser de qualquer cor <span class="norma-red">(Item 6.1.5.3.4 da NBR-5410)</span></div>
    
    <script>
        // Mantenha todas as suas variáveis e lógica original
        // Apenas altere o final da função executarAnimacaoFluida e o window.onload
        
        function executarAnimacaoFluida(dados) {
            const imgElemento = document.getElementById(dados.imgId);
            imgElemento.classList.remove('oculto');
            let frameIdx = 0; 
            const frames = cacheImagens[dados.pasta];
            let contador = 0;
            
            function animar() {
                if (frameIdx < frames.length) {
                    if (contador % 3 === 0) { 
                        imgElemento.src = frames[frameIdx].src; 
                        frameIdx++; 
                    }
                    contador++; 
                    requestAnimationFrame(animar);
                } else { 
                    tocarSom('audio-conexao'); 
                    etapaAtual++;
                    
                    // Verifica se terminou o NEUTRO_2 (quinta etapa, índice 4)
                    if (etapaAtual === 5) {
                        document.getElementById('balao-1').classList.remove('oculto');
                        document.getElementById('balao-2').classList.remove('oculto');
                        // Evento de clique para sumir
                        window.addEventListener('click', removerBaloes);
                    }
                    
                    setTimeout(proximoPasso, 400); 
                }
            }
            requestAnimationFrame(animar);
        }

        function removerBaloes() {
            document.getElementById('balao-1').classList.add('oculto');
            document.getElementById('balao-2').classList.add('oculto');
            window.removeEventListener('click', removerBaloes);
        }

        // Garante que o sistema inicie corretamente
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof proximoPasso === 'function') {
                proximoPasso();
            }
        });
    </script>
</body>
</html>
