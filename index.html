<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Escala Longitudinal Protegida</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* O CONTAINER MESTRE AGORA TEM DIMENSÕES ABSOLUTAS */
        #app-container {
            width: 1920px;
            height: 1080px;
            min-width: 1920px;
            min-height: 1080px;
            position: relative;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            background-color: #000;
        }

        /* 1. TÍTULO - Altura Fixa */
        #zona-titulo {
            height: 110px; /* Fixado */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .titulo-cyan {
            color: #00f2ff;
            font-size: 52px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* 2. LINHA DE STATUS - Altura Fixa */
        #zona-status {
            height: 90px; /* Fixado */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .caixa-status {
            background: rgba(15, 20, 25, 0.95);
            border: 1px solid #1a3a5a;
            padding: 12px 60px;
            border-radius: 8px;
            min-width: 900px;
            text-align: center;
        }
        .texto-gold {
            color: #ffcc00;
            font-size: 26px;
            font-weight: bold;
        }

        /* 3. QUADRO PRINCIPAL - Altura Restante (1080 - 110 - 90 = 880px) */
        #quadro-principal {
            width: 1840px; /* 1920 menos as margens de 40px cada lado */
            height: 840px; /* Altura calculada para sobrar espaço no rodapé se necessário */
            margin: 0 auto;
            position: relative;
            border: 2px solid #222;
            background-color: #0a0a0a;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* GARANTE QUE O FUNDO E CABOS PREENCHAM O QUADRO SEM DISTORÇÃO */
        .camada-grafica {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* Força o preenchimento total do quadro de 840px */
            pointer-events: none;
        }

        .cabo-oculto { display: none; }

        /* PONTOS DE CONEXÃO */
        .ponto-conexao {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            border: 3px solid #fff;
            transform: translate(-50%, -50%);
            transition: 0.2s;
        }
        .ponto-fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .ponto-neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .ponto-retorno { background-color: #ffffff; box-shadow: 0 0 15px #000; }
        .ponto-sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        #btn-reiniciar {
            position: absolute;
            bottom: 20px;
            right: 40px;
            background: linear-gradient(180deg, #cc0000, #880000);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header id="zona-titulo">
            <h1 class="titulo-cyan">LABORATÓRIO SMT PRO</h1>
        </header>

        <section id="zona-status">
            <div class="caixa-status">
                <p class="texto-gold" id="texto-instrucao">AGUARDANDO CONEXÃO...</p>
            </div>
        </section>

        <main id="quadro-principal">
            <img src="ambiente.jpg" class="camada-grafica">
            <img id="camada-fase-rede" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-rede" class="camada-grafica cabo-oculto">
            <img id="camada-fase-2" class="camada-grafica cabo-oculto">
            <img id="camada-retorno" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-2" class="camada-grafica cabo-oculto">
            <div id="container-pontos"></div>
        </main>

        <button id="btn-reiniciar">REINICIAR</button>
    </div>

    <script>
        const container = document.getElementById('app-container');

        // FUNÇÃO DE ESCALA QUE PRESERVA O ASPECT RATIO (16:9)
        function ajustarEscala() {
            const larguraJanela = window.innerWidth;
            const alturaJanela = window.innerHeight;

            // Calcula a escala baseada na dimensão que "apertar" primeiro
            const escala = Math.min(larguraJanela / 1920, alturaJanela / 1080);
            
            container.style.transform = `scale(${escala})`;
        }

        window.addEventListener('resize', ajustarEscala);
        window.addEventListener('load', ajustarEscala);

        // --- LÓGICA DE INSTALAÇÃO DOS 5 CABOS ---
        const roteiro = [
            { nome: "Fase Rede", pasta: "FASE_REDE", total: 64, idImg: "camada-fase-rede", cor: "ponto-fase", origem: { x: 450, y: 350 }, destino: { x: 450, y: 500 } },
            { nome: "Neutro Rede", pasta: "NEUTRO_REDE", total: 76, idImg: "camada-neutro-rede", cor: "ponto-neutro", origem: { x: 510, y: 350 }, destino: { x: 510, y: 500 } },
            { nome: "Fase Circuito 2", pasta: "FASE_2", total: 25, idImg: "camada-fase-2", cor: "ponto-fase", origem: { x: 600, y: 550 }, destino: { x: 1100, y: 700 } },
            { nome: "Retorno Lâmpada", pasta: "RETORNO", total: 45, idImg: "camada-retorno", cor: "ponto-retorno", origem: { x: 1120, y: 700 }, destino: { x: 1350, y: 640 } },
            { nome: "Neutro Lâmpada", pasta: "NEUTRO_2", total: 15, idImg: "camada-neutro-2", cor: "ponto-neutro", origem: { x: 1380, y: 640 }, destino: { x: 550, y: 550 } }
        ];

        let etapaAtual = 0;
        const textoInstrucao = document.getElementById('texto-instrucao');
        const containerPontos = document.getElementById('container-pontos');

        function proximoPasso() {
            if (etapaAtual >= roteiro.length) {
                textoInstrucao.innerText = "CIRCUITO MONTADO COM SUCESSO!";
                return;
            }

            const dados = roteiro[etapaAtual];
            textoInstrucao.innerText = `INSTALE O CABO: ${dados.nome.toUpperCase()}`;

            criarBolinha(dados.origem.x, dados.origem.y, dados.cor, function() {
                this.classList.add('ponto-sucesso');
                criarBolinha(dados.destino.x, dados.destino.y, dados.cor, function() {
                    containerPontos.innerHTML = "";
                    rodarAnimacao(dados);
                });
            });
        }

        function criarBolinha(x, y, cor, clique) {
            const b = document.createElement('div');
            b.className = `ponto-conexao ${cor}`;
            b.style.left = x + "px";
            b.style.top = y + "px";
            b.onclick = clique;
            containerPontos.appendChild(b);
        }

        function rodarAnimacao(dados) {
            const img = document.getElementById(dados.idImg);
            img.classList.remove('cabo-oculto');
            let frame = 1;
            function frameLoop() {
                if (frame <= dados.total) {
                    const n = String(frame).padStart(4, '0');
                    img.src = `${dados.pasta}/quadro${n}.png`;
                    frame++;
                    requestAnimationFrame(frameLoop);
                } else {
                    etapaAtual++;
                    proximoPasso();
                }
            }
            frameLoop();
        }

        document.getElementById('btn-reiniciar').onclick = () => location.reload();
        window.onload = () => { ajustarEscala(); proximoPasso(); };
    </script>
</body>
</html>
