<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Contêiner único que trava a proporção 16:9 e escala tudo junto */
        #main-wrapper {
            position: relative;
            width: 90vw;
            max-width: 1920px;
            aspect-ratio: 1920 / 1080;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #tela-splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; border: 2px solid #00ffff; box-sizing: border-box; }
        #splash-content { text-align: center; color: #00ffff; }

        /* Painel agora faz parte do mesmo fluxo que o Header */
        #painel-game { position: relative; width: 100%; height: 100%; background: url('ambiente.jpg') no-repeat center; background-size: contain; }
        
        /* Cabeçalho incorporado ao fluxo do painel */
        .ui-header { width: 100%; text-align: center; margin-bottom: 2%; }
        h1 { font-size: 4vw; margin: 0; color: #00ffff; text-transform: uppercase; }
        #status-bar { width: 90%; margin: 1% auto; padding: 2%; border: 2px solid #333; background: rgba(0,0,0,0.9); color: #ff8800; font-weight: bold; font-size: 1.5vw; border-radius: 4px; box-sizing: border-box; }

        /* Elementos posicionados via %, que agora NUNCA descolam porque o pai tem aspect-ratio fixo */
        .funcional { position: absolute; width: 5%; cursor: pointer; z-index: 2000; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bolinha { width: 2%; aspect-ratio: 1/1; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 2px solid white; z-index: 1000; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="tela-splash">
        <div id="splash-content">
            <h1>LABORATÓRIO SMT PRO</h1>
            <button id="btn-iniciar" style="padding: 20px; font-size: 20px;">INICIAR</button>
        </div>
    </div>

    <div id="painel-game" style="display:none;">
        <div class="ui-header">
            <h1>LABORATÓRIO SMT PRO</h1>
            <div id="status-bar">REDE: CLIQUE NA REFERÊNCIA INDICADA</div>
        </div>
        
        <img id="btn_dg" class="funcional" src="al_dg_off.png" style="top: 26%; left: 12%;">
        <canvas id="canvasCabo"></canvas>
    </div>
</div>

<script>
    document.getElementById('btn-iniciar').onclick = () => {
        document.getElementById('tela-splash').style.display = 'none';
        document.getElementById('painel-game').style.display = 'block';
    };
    // ... restante da sua lógica JS ...
</script>
</body>
</html>
