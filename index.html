<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; overflow: hidden; font-family: sans-serif; }
        
        .neon-text { color: #00ffff; text-shadow: 0 0 10px #00ffff; text-transform: uppercase; font-weight: normal; }
        .neon-box { border: 2.5px solid #00ffff; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); border-radius: 60px; background: rgba(0, 0, 0, 0.9); }

        #splash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #splash-content { text-align: center; padding: 3vw 5vw; width: auto; min-width: 45%; }
        #btn-iniciar { padding: 0.7vw 1.8vw; cursor: pointer; background: transparent; color: #00ffff; border: 1.5px solid #00ffff; font-size: 0.85vw; border-radius: 50px; text-shadow: 0 0 5px #00ffff; }

        #main-layout { width: 90vw; max-width: 1920px; display: flex; flex-direction: column; align-items: center; }
        #status-bar { width: 100%; padding: 1.5vw; box-sizing: border-box; margin-bottom: 1vw; color: #ff8800; text-align: center; font-size: 1.2vw; border: 2px solid #333; }

        #game-container { position: relative; width: 100%; aspect-ratio: 1920 / 1080; background: url('ambiente.jpg') no-repeat center center; background-size: contain; overflow: hidden; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .bolinha { width: 2%; aspect-ratio: 1/1; border-radius: 50%; position: absolute; cursor: pointer; display: none; border: 0.2vw solid white; z-index: 1000; box-sizing: border-box; }
        .conector { position: absolute; width: 5.2%; z-index: 999 !important; display: none; }
        #btn_dg, #btn_dr, #btn_int { position: absolute; z-index: 990; cursor: pointer; width: 5.7%; }

        .hotspot { position: absolute; background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; cursor: pointer; z-index: 850; }
        .hotspot:hover { background: rgba(0, 255, 255, 0.3); }
        
        #info-box { position: absolute; top: 5%; left: 35%; width: 30%; padding: 1vw; background: rgba(0, 0, 0, 0.9); border: 2px solid #00ffff; color: #00ffff; display: none; z-index: 3000; pointer-events: none; border-radius: 15px; text-align: center; font-size: 1.5vw; }
    </style>
</head>
<body>
    <div id="splash-overlay"><div id="splash-content" class="neon-box"><button id="btn-iniciar" class="neon-text">INICIAR</button></div></div>
    <div id="main-layout">
        <div id="game-container">
            <div class="hotspot" title="REDE ELÉTRICA" style="top: 52%; left: 5%; width: 3vw; height: 12vw;" onmouseover="mostrarInfo('REDE ELÉTRICA')" onmouseout="esconderInfo()"></div>
            <div id="info-box"></div>
            <canvas id="canvasCabo" width="1920" height="1080"></canvas>
            <div id="bolinha1" class="bolinha"></div>
            <div id="bolinha2" class="bolinha"></div>
        </div>
    </div>
    <script>
        // Lógica limpa
        function iniciarCabo() {
            const c = cabos[indiceAtual];
            b1.style.display = "block"; 
            b1.style.backgroundColor = c.cor;
            b1.style.left = c.b1.x + "%"; b1.style.top = c.b1.y + "%";
            b1.onclick = () => {
                b1.style.backgroundColor = "green"; // A bolinha fica verde aqui
                b2.style.backgroundColor = c.cor;
                b2.style.left = c.b2.x + "%"; b2.style.top = c.b2.y + "%";
                b2.style.display = "block";
            };
            b2.onclick = () => { b1.style.display = "none"; b2.style.display = "none"; animar(c); };
        }
        // ... (resto da lógica original que você usa)
    </script>
</body>
</html>
