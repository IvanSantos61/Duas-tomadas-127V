<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - Simulação Completa</title>
    <style>
        /* ZERAMENTO E ESTRUTURA */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: #05070a;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* CONTAINER MESTRE (1920x1080) */
        #app-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            background-color: #000;
        }

        /* 1. TÍTULO (Topo - Fora do quadro) */
        #zona-titulo {
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .titulo-cyan {
            color: #00f2ff;
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* 2. LINHA DE STATUS (Meio - Fora do quadro) */
        #zona-status {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .caixa-status {
            background: rgba(10, 15, 20, 0.95);
            border: 1px solid #1a3a5a;
            padding: 15px 60px;
            border-radius: 10px;
            min-width: 850px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .texto-gold {
            color: #ffcc00;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 3. QUADRO PRINCIPAL DE EQUIPAMENTOS */
        #quadro-principal {
            flex: 1;
            position: relative;
            margin: 0 40px 30px 40px;
            border: 2px solid #2a2a2a;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        .camada-grafica {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .cabo-oculto { display: none; }

        /* INTERAÇÃO: BOLINHAS (CHECKPOINTS) */
        .ponto-conexao {
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            border: 3px solid #ffffff;
            transform: translate(-50%, -50%); /* Centraliza exatamente na coordenada */
            transition: all 0.2s ease;
        }
        .ponto-conexao:hover { transform: translate(-50%, -50%) scale(1.3); }

        /* Cores conforme o tipo de cabo */
        .ponto-fase { background-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .ponto-neutro { background-color: #0066ff; box-shadow: 0 0 15px #0066ff; }
        .ponto-retorno { background-color: #ffffff; box-shadow: 0 0 15px #000; }
        .ponto-sucesso { background-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        /* Botão Reiniciar */
        #btn-reiniciar {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(180deg, #cc0000 0%, #880000 100%);
            color: white;
            border: 1px solid #500;
            padding: 12px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            z-index: 110;
        }
        #btn-reiniciar:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="app-container">
        
        <header id="zona-titulo">
            <h1 class="titulo-cyan">LABORATÓRIO SMT PRO</h1>
        </header>

        <section id="zona-status">
            <div class="caixa-status">
                <p class="texto-gold" id="texto-instrucao">AGUARDANDO INÍCIO...</p>
            </div>
        </section>

        <main id="quadro-principal">
            <img src="ambiente.jpg" class="camada-grafica">
            
            <img id="camada-fase-rede" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-rede" class="camada-grafica cabo-oculto">
            <img id="camada-fase-2" class="camada-grafica cabo-oculto">
            <img id="camada-neutro-2" class="camada-grafica cabo-oculto">
            <img id="camada-retorno" class="camada-grafica cabo-oculto">

            <div id="container-pontos"></div>

            <button id="btn-reiniciar">REINICIAR</button>
        </main>

    </div>

    <script>
        // --- 1. AJUSTE DE ESCALA (ZOOM RESISTANT) ---
        const container = document.getElementById('app-container');
        function ajustarEscala() {
            const escala = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${escala})`;
        }
        window.addEventListener('resize', ajustarEscala);
        window.addEventListener('load', ajustarEscala);

        // --- 2. ROTEIRO COMPLETO (OS 5 CABOS) ---
        // ATENÇÃO: Ajuste as coordenadas X e Y conforme a posição real no seu ambiente.jpg
        const roteiro = [
            { 
                nome: "Fase da Rede", pasta: "FASE_REDE", total: 64, idImg: "camada-fase-rede", cor: "ponto-fase",
                origem: { x: 520, y: 400 }, destino: { x: 520, y: 560 }
            },
            { 
                nome: "Neutro da Rede", pasta: "NEUTRO_REDE", total: 76, idImg: "camada-neutro-rede", cor: "ponto-neutro",
                origem: { x: 580, y: 400 }, destino: { x: 580, y: 560 }
            },
            { 
                nome: "Fase do Circuito", pasta: "FASE_2", total: 25, idImg: "camada-fase-2", cor: "ponto-fase",
                origem: { x: 650, y: 600 }, destino: { x: 1140, y: 740 }
            },
            { 
                nome: "Retorno da Lâmpada", pasta: "RETORNO", total: 45, idImg: "camada-retorno", cor: "ponto-retorno",
                origem: { x: 1160, y: 740 }, destino: { x: 1400, y: 680 }
            },
            { 
                nome: "Neutro da Lâmpada", pasta: "NEUTRO_2", total: 15, idImg: "camada-neutro-2", cor: "ponto-neutro",
                origem: { x: 1430, y: 680 }, destino: { x: 600, y: 600 }
            }
        ];

        let etapaAtual = 0;
        const textoInstrucao = document.getElementById('texto-instrucao');
        const containerPontos = document.getElementById('container-pontos');

        // --- 3. LÓGICA DE INTERAÇÃO ---
        function carregarEtapa() {
            if (etapaAtual >= roteiro.length) {
                textoInstrucao.innerText = "SIMULAÇÃO CONCLUÍDA! CIRCUITO ENERGIZADO.";
                textoInstrucao.style.color = "#00f2ff";
                return;
            }

            const passo = roteiro[etapaAtual];
            textoInstrucao.innerText = `PASSO ${etapaAtual + 1}: INSTALAR ${passo.nome.toUpperCase()}`;
            textoInstrucao.style.color = "#ffcc00";

            // Criar ponto de ORIGEM
            criarPonto(passo.origem.x, passo.origem.y, passo.cor, function() {
                this.classList.add('ponto-sucesso'); // Bolinha fica verde
                
                // Criar ponto de DESTINO
                criarPonto(passo.destino.x, passo.destino.y, passo.cor, function() {
                    containerPontos.innerHTML = ""; // Limpa bolinhas
                    executarAnimacao(passo);
                });
            });
        }

        function criarPonto(x, y, classeCor, cliqueFn) {
            const ponto = document.createElement('div');
            ponto.className = `ponto-conexao ${classeCor}`;
            ponto.style.left = x + "px";
            ponto.style.top = y + "px";
            ponto.onclick = (e) => {
                e.stopPropagation();
                cliqueFn.call(ponto); // Executa a função passando o ponto como 'this'
            };
            containerPontos.appendChild(ponto);
        }

        function executarAnimacao(passo) {
            const img = document.getElementById(passo.idImg);
            img.classList.remove('cabo-oculto');
            let frame = 1;

            function processar() {
                if (frame <= passo.total) {
                    const idx = String(frame).padStart(4, '0');
                    img.src = `${passo.pasta}/quadro${idx}.png`;
                    frame++;
                    requestAnimationFrame(processar);
                } else {
                    etapaAtual++;
                    setTimeout(carregarEtapa, 500); // Pequena pausa para o usuário ver o cabo pronto
                }
            }
            processar();
        }

        document.getElementById('btn-reiniciar').onclick = () => location.reload();

        // Início imediato
        window.onload = () => {
            ajustarEscala();
            carregarEtapa();
        };
    </script>
</body>
</html>
