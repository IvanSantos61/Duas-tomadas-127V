<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro - Versão Estável</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #05070a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #quadro-simulacao { position: relative; width: 100%; max-width: 1600px; aspect-ratio: 1920/1080; background-color: #000; overflow: hidden; }
        .tecla-interativa { position: absolute; z-index: 999; cursor: pointer; }
        .oculto { display: none !important; }
        #comp-dg { width: 4%; top: 26%; left: 12%; }
        #comp-dr { width: 5%; top: 29%; left: 23.6%; }
        #comp-int { width: 6%; top: 67%; left: 63%; }
        .status-on { color: #00ff00; }
        .status-off { color: #ff3333; }
    </style>
</head>
<body>

    <main id="quadro-simulacao">
        <img id="img-lampada" src="lamp_on.png" class="oculto" style="position: absolute; z-index: 70; top: 315px; left: 992px; width: 150px;">
        
        <img id="comp-dg" src="al_dg_off.png" data-state="off" class="tecla-interativa" onclick="executarToggle(this, 'al_dg_off.png', 'al_dg_on.png')">
        <img id="comp-dr" src="al_dr_off.png" data-state="off" class="tecla-interativa" onclick="executarToggle(this, 'al_dr_off.png', 'al_dr_on.png')">
        <img id="comp-int" src="tec_int_off.png" data-state="off" class="tecla-interativa" onclick="executarToggle(this, 'tec_int_off.png', 'tec_int_on.png')">

        <div id="painel-dispositivos" style="position: absolute; top: 10%; left: 10%; background: #000; color: white; padding: 20px; border: 1px solid #fff; z-index: 100;">
            <h3>Status</h3>
            <div id="txt-dg">DG: [ OFF ] ❌</div>
            <div id="txt-dr">DR: [ OFF ] ❌</div>
            <div id="txt-int">INT: [ OFF ] ❌</div>
        </div>
    </main>

    <script>
        // Função de disparo único e protegida
        function executarToggle(el, off, on) {
            // 1. Alterna estado físico
            const isOff = el.getAttribute('data-state') === 'off';
            el.setAttribute('data-state', isOff ? 'on' : 'off');
            el.src = isOff ? on : off;

            // 2. Atualiza UI de texto diretamente
            const txt = document.getElementById(el.id.replace('comp-', 'txt-'));
            if (txt) {
                txt.innerHTML = (isOff ? el.id.replace('comp-','').toUpperCase() + ': [ ON ] ✅' : el.id.replace('comp-','').toUpperCase() + ': [ OFF ] ❌');
            }

            // 3. Verifica lâmpada sem interdependências
            const dg = document.getElementById('comp-dg').getAttribute('data-state');
            const dr = document.getElementById('comp-dr').getAttribute('data-state');
            const int = document.getElementById('comp-int').getAttribute('data-state');
            const lamp = document.getElementById('img-lampada');

            if (dg === 'on' && dr === 'on' && int === 'on') {
                lamp.classList.remove('oculto');
            } else {
                lamp.classList.add('oculto');
            }
        }

        // Função de áudio mantida separada
        function tocarSom(id) {
            const s = document.getElementById(id);
            if(s) { s.currentTime=0; s.play().catch(()=>{}); }
        }
    </script>
</body>
</html>
